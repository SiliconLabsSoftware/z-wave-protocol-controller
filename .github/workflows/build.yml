# YAML -*- mode: yaml; tab-width: 2; indent-tabs-mode: nil; coding: utf-8 -*-
---

name: Build in docker

on:  # yamllint disable-line rule:truthy
  push:

jobs:
  build:
    env:
      project-name: unifysdk  # This should be lowercase for docker (and aligned)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0
      - id: describe
        name: Describe HEAD
        run: >-
          echo "describe=$(git describe --tags --always || echo 0)"
          | tee $GITHUB_OUTPUT
      - name: Build Docker image from sources
        run: >-
          docker build
          --tag "${{ env.project-name }}:latest"
          --build-arg VALUE=${{ secrets.GH_UNIFY_ACCESS_TOKEN }}
          .
